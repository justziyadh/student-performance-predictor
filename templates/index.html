<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Student Performance Predictor</h1>

    <form action="/predict" method="post">

        <input type="number" name="study_hours" placeholder="Study Hours" required>

        <input type="number" name="attendance" placeholder="Attendance %" required>

        <input type="number" name="sleep_hours" placeholder="Sleep Hours" required>

        <input type="number" name="previous_marks" placeholder="Previous Marks" required>

        <button type="submit">Predict</button>

    </form>

    <h2>{{ prediction_text }}</h2>

</div>

</body>
</html>
